version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd prospectai-next && npm install
    build:
      commands:
        - cd prospectai-next && npm run build
  artifacts:
    baseDirectory: prospectai-next
    files:
      - '**/*'
  cache:
    paths:
      - prospectai-next/node_modules/**/*
