<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProspectAI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080c14; color: #c8d4e8; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
    .fade-up { animation: fadeUp 0.4s ease; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #1a2535; border-radius: 2px; }
    button { font-family: 'DM Sans', sans-serif; cursor: pointer; }
    input, textarea { font-family: 'DM Sans', sans-serif; }
    textarea { resize: none; }

    /* Layout */
    #app { display: flex; flex-direction: column; min-height: 100vh; }
    header { padding: 18px 32px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    nav { padding: 0 32px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; }
    main { padding: 28px 32px; flex: 1; }

    /* Header */
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #00ffc8, #0080ff); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .logo-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: #e8edf5; letter-spacing: -0.5px; }
    .logo-sub { font-size: 11px; color: #405060; }
    .stats { display: flex; gap: 28px; }
    .stat { text-align: center; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
    .stat-label { font-size: 10px; color: #405060; letter-spacing: 0.5px; }

    /* Nav */
    .nav-btn { padding: 14px 20px; background: transparent; border: none; border-bottom: 2px solid transparent; color: #506070; font-size: 13px; font-weight: 400; transition: all 0.2s; letter-spacing: 0.2px; }
    .nav-btn.active { color: #00ffc8; border-bottom-color: #00ffc8; font-weight: 600; }

    /* Cards */
    .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .lead-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; }
    .lead-card:hover { border-color: rgba(255,255,255,0.12); }
    .lead-card.selected { background: rgba(0,255,200,0.05); border-color: rgba(0,255,200,0.3); }

    /* Score bar */
    .score-wrap { display: flex; align-items: center; gap: 8px; }
    .score-track { flex: 1; height: 4px; background: #1a1f2e; border-radius: 2px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }

    /* Buttons */
    .btn-primary { background: linear-gradient(135deg, #00ffc8, #00b8a0); border: none; border-radius: 8px; padding: 10px 22px; color: #001a14; font-weight: 700; font-size: 13px; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { background: rgba(0,255,200,0.1); color: #00ffc8; cursor: not-allowed; }
    .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 18px; color: #506070; font-size: 13px; transition: all 0.15s; }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.2); color: #c8d4e8; }
    .btn-pill { background: transparent; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 5px 12px; color: #506070; font-size: 12px; transition: all 0.15s; }
    .btn-pill.active { background: rgba(0,255,200,0.08); border-color: #00ffc8; color: #00ffc8; }
    .btn-action { background: rgba(0,255,200,0.05); border: 1px solid rgba(0,255,200,0.2); border-radius: 20px; padding: 4px 12px; color: #00ffc8; font-size: 11px; }

    /* Progress */
    .progress-track { height: 4px; background: #0d1520; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #00ffc8, #0080ff); border-radius: 2px; transition: width 0.2s ease; }

    /* Status badge */
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 0.3px; }

    /* Grid layouts */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .grid-outreach { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }

    /* Search row */
    .search-row { display: flex; gap: 12px; margin-bottom: 14px; }
    .search-input { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 14px; color: #c8d4e8; font-size: 13px; outline: none; }
    .search-input::placeholder { color: #405060; }
    .filter-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    /* Section heading */
    .section-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #e8edf5; margin-bottom: 6px; }
    .section-sub { color: #506070; font-size: 14px; margin-bottom: 24px; }
    .micro-label { font-size: 11px; color: #405060; letter-spacing: 0.8px; margin-bottom: 10px; }

    /* Textarea */
    .email-area { width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; color: #c8d4e8; font-size: 13px; line-height: 1.65; outline: none; }

    /* Empty state */
    .empty { text-align: center; padding: 48px 24px; color: #304050; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* Status colors */
    :root {
      --new: #00ffc8;
      --contacted: #f0c040;
      --replied: #60a0ff;
      --meeting: #c060ff;
      --declined: #ff5060;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-name">ProspectAI</div>
        <div class="logo-sub">Automated Sales Intelligence</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-value" id="stat-found" style="color:#00ffc8">0</div><div class="stat-label">LEADS FOUND</div></div>
      <div class="stat"><div class="stat-value" id="stat-contacted" style="color:#f0c040">0</div><div class="stat-label">CONTACTED</div></div>
      <div class="stat"><div class="stat-value" id="stat-replied" style="color:#60a0ff">0</div><div class="stat-label">REPLIED</div></div>
      <div class="stat"><div class="stat-value" id="stat-meetings" style="color:#c060ff">0</div><div class="stat-label">MEETINGS</div></div>
    </div>
  </header>
  <nav>
    <button class="nav-btn active" onclick="setStage(0)">Find Leads</button>
    <button class="nav-btn" onclick="setStage(1)">Craft Outreach</button>
    <button class="nav-btn" onclick="setStage(2)">Follow Up</button>
    <button class="nav-btn" onclick="setStage(3)">Pipeline</button>
  </nav>
  <main id="main-content"></main>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let state = {
  stage: 0,
  leads: [],
  selectedLead: null,
  hubspotPushed: {},
  emailType: 'initial',
  emailContent: '',
  selectedIndustries: [],
  selectedEmployeeRanges: [],
  minScore: 0,
  sourceFilter: 'all',
  searching: false,
  searchProgress: 0,
};

const INDUSTRIES = [
  { label: 'Technology', value: '5567cd4773696439b10b0000' },
  { label: 'Software', value: '5567cd4773696439b10c0000' },
  { label: 'Healthcare', value: '5567cd4773696439b1110000' },
  { label: 'Finance & Banking', value: '5567cd4773696439b10e0000' },
  { label: 'E-commerce & Retail', value: '5567cd4773696439b1120000' },
  { label: 'Education', value: '5567cd4773696439b1130000' },
  { label: 'Media & Entertainment', value: '5567cd4773696439b1160000' },
  { label: 'Manufacturing', value: '5567cd4773696439b1140000' },
  { label: 'Real Estate', value: '5567cd4773696439b1180000' },
  { label: 'Marketing & Advertising', value: '5567cd4773696439b1150000' },
];

const EMPLOYEE_RANGES = [
  '1-10', '11-50', '51-200', '201-500', '501-1000', '1001-5000', '5001+'
];

const STATUS_COLORS = { new: '#00ffc8', contacted: '#f0c040', replied: '#60a0ff', meeting: '#c060ff', declined: '#ff5060' };
const STATUS_LABELS = { new: 'New', contacted: 'Contacted', replied: 'Replied', meeting: 'Meeting Booked', declined: 'Declined' };

// ── Helpers ────────────────────────────────────────────────────────────────
function scoreColor(s) { return s > 89 ? '#00ffc8' : s > 75 ? '#f0c040' : '#ff7040'; }

function scoreBar(score) {
  return `<div class="score-wrap">
    <div class="score-track"><div class="score-fill" style="width:${score}%;background:${scoreColor(score)}"></div></div>
    <span style="font-size:12px;color:#7080a0;width:28px;text-align:right">${score}</span>
  </div>`;
}

function badge(status) {
  return `<span class="badge" style="background:${STATUS_COLORS[status]}18;color:${STATUS_COLORS[status]}">${STATUS_LABELS[status]}</span>`;
}

function leadCard(lead, selected) {
  const statusBtns = ['contacted','replied','meeting','declined'].map(s =>
    `<button onclick="event.stopPropagation();setStatus('${lead.id}','${s}')" style="font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid ${STATUS_COLORS[s]}40;background:${lead.status===s?STATUS_COLORS[s]+'20':'transparent'};color:${lead.status===s?STATUS_COLORS[s]:'#506070'};cursor:pointer;transition:all 0.15s">${STATUS_LABELS[s]}</button>`
  ).join('');
  const hsPushed = state.hubspotPushed[lead.id];
  const hsBtn = `<button id="hs-btn-${lead.id}" onclick="event.stopPropagation();sendToHubspot('${lead.id}')" style="font-size:10px;padding:2px 10px;border-radius:20px;border:1px solid ${hsPushed?'#00ffc840':'#ff8c0040'};background:${hsPushed?'rgba(0,255,200,0.1)':'rgba(255,140,0,0.08)'};color:${hsPushed?'#00ffc8':'#ff8c00'};cursor:${hsPushed?'default':'pointer'}" ${hsPushed?'disabled':''}>${hsPushed?'✓ In HubSpot':'⬆ HubSpot'}</button>`;
  return `<div class="lead-card ${selected?'selected':''}" onclick="selectLead('${lead.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div>
        <div style="font-weight:600;color:#e8edf5;font-size:14px">${lead.name}</div>
        <div style="font-size:12px;color:#7080a0;margin-top:2px">${lead.title} · ${lead.company}${lead.location?' · '+lead.location:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        ${badge(lead.status)}
        <span style="font-size:10px;color:#506070">${lead.source}</span>
      </div>
    </div>
    ${scoreBar(lead.score)}
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center">${statusBtns}<span style="flex:1"></span>${hsBtn}</div>
  </div>`;
}

function generateEmail(lead, type) {
  const fn = lead.name.split(' ')[0];
  const isSales = lead.title.includes('Sales')||lead.title.includes('Revenue')||lead.title.includes('CRO')||lead.title.includes('Growth');
  const fundingNote = lead.funding && lead.funding !== 'Unknown' ? `the ${lead.funding}` : 'your growth';
  if (type === 'initial') return `Subject: Quick question for ${lead.company}\n\nHi ${fn},\n\nI came across ${lead.company} while researching high-growth companies in your space — congrats on ${fundingNote}.\n\nI work with ${isSales?'revenue teams':'growth leaders'} who are trying to [specific pain point] without [common friction].\n\nWould it be worth a 15-minute call this week to see if there's a fit?\n\nBest,\n[Your Name]`;
  if (type === 'followup') return `Subject: Re: Quick question for ${lead.company}\n\nHi ${fn},\n\nFollowing up on my note from last week — I know your inbox is busy.\n\nI wanted to share one quick thing: [specific result/case study relevant to ${lead.company}].\n\nStill worth a quick chat?\n\nBest,\n[Your Name]`;
  return `Subject: Closing the loop\n\nHi ${fn},\n\nI'll stop following up after this — I don't want to be a nuisance.\n\nIf the timing ever changes and [pain point] becomes a priority, I'm here.\n\nWishing ${lead.company} continued success.\n\nBest,\n[Your Name]`;
}

function updateStats() {
  const s = { found: state.leads.length, contacted: 0, replied: 0, meetings: 0 };
  state.leads.forEach(l => {
    if (['contacted','replied','meeting'].includes(l.status)) s.contacted++;
    if (['replied','meeting'].includes(l.status)) s.replied++;
    if (l.status === 'meeting') s.meetings++;
  });
  document.getElementById('stat-found').textContent = s.found;
  document.getElementById('stat-contacted').textContent = s.contacted;
  document.getElementById('stat-replied').textContent = s.replied;
  document.getElementById('stat-meetings').textContent = s.meetings;
}

// ── Actions ────────────────────────────────────────────────────────────────
function setStage(n) {
  state.stage = n;
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===n));
  render();
}

function selectLead(id) {
  state.selectedLead = state.leads.find(l => l.id === id) || null;
  state.emailContent = '';
  render();
}

function setStatus(id, status) {
  state.leads = state.leads.map(l => l.id === id ? {...l, status} : l);
  updateStats();
  render();
}

function setEmailType(t) {
  state.emailType = t;
  state.emailContent = '';
  render();
}

function generateAndShow() {
  if (!state.selectedLead) return;
  state.emailContent = generateEmail(state.selectedLead, state.emailType);
  render();
}

async function sendToHubspot(id) {
  const lead = state.leads.find(l => l.id === id);
  if (!lead) return;
  const btn = document.getElementById('hs-btn-' + id);
  if (btn) { btn.textContent = '⏳ Sending...'; btn.disabled = true; }
  try {
    const res = await fetch('/api/hubspot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: lead.name, email: lead.email, title: lead.title, company: lead.company, linkedin: lead.linkedin }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'HubSpot error');
    state.hubspotPushed[id] = true;
    render();
  } catch (err) {
    if (btn) { btn.textContent = '✕ Failed'; btn.style.color = '#ff5060'; btn.disabled = false; }
    alert('HubSpot error: ' + err.message);
  }
}
function copyEmail() {
  navigator.clipboard.writeText(state.emailContent);
  const btn = document.getElementById('copy-btn');
  if (btn) { btn.textContent = '✓ Copied'; btn.style.color = '#00ffc8'; setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = '#506070'; }, 1800); }
}

async function doSearch() {
  if (state.searching) return;
  state.searching = true;
  state.searchProgress = 0;
  render();

  let prog = 0;
  const interval = setInterval(() => {
    prog += Math.random() * 8 + 2;
    if (prog < 85) {
      state.searchProgress = Math.min(prog, 85);
      const bar = document.getElementById('prog-bar');
      const label = document.getElementById('prog-label');
      if (bar) bar.style.width = state.searchProgress + '%';
      if (label) {
        const p = state.searchProgress;
        label.textContent = p < 30 ? '🔍 Scanning Apollo database...' : p < 60 ? '📊 Pulling company data...' : p < 85 ? '✨ Scoring & ranking leads...' : '⚡ Almost done...';
      }
    }
  }, 200);

  try {
    const titles = state.searchQuery.trim() ? [state.searchQuery.trim()] : ['VP of Sales'];

    // ── CHANGE THIS URL after deploying to Vercel ──────────────────────────
    const API_URL = '/api/apollo';
    // ──────────────────────────────────────────────────────────────────────

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
          industry: state.selectedIndustries,
          employee_ranges: state.selectedEmployeeRanges,
          page: 1,
          per_page: 25,
        }),
    });

    clearInterval(interval);

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const people = data.people || [];

    state.leads = people.map((p, i) => ({
      id: p.id || String(i),
      name: `${p.first_name||''} ${p.last_name||''}`.trim() || 'Unknown',
      title: p.title || 'Unknown Title',
      company: p.organization?.name || p.employment_history?.[0]?.organization_name || 'Unknown',
      source: 'Apollo',
      funding: p.organization?.latest_funding_stage || 'Unknown',
      status: 'new',
      email: p.email || '—',
      score: Math.min(99, 60 + (p.email ? 20 : 0) + (p.organization?.estimated_num_employees > 10 ? 10 : 0) + Math.floor(Math.random()*12)),
      linkedin: p.linkedin_url || '',
      location: [p.city, p.state, p.country].filter(Boolean).join(', '),
    }));

    state.searchProgress = 100;
    state.searching = false;
    updateStats();
    render();
  } catch (err) {
    clearInterval(interval);
    state.searching = false;
    render();
    alert('Search failed: ' + err.message);
  }
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('main-content');
  const { stage, leads, selectedLead, emailType, emailContent, searching, searchProgress, sourceFilter, minScore } = state;

  const filtered = leads.filter(l => {
    if (sourceFilter !== 'all' && l.source !== sourceFilter) return false;
    if (l.score < minScore) return false;
    return true;
  });

  if (stage === 0) {
      // ── FIND LEADS ─────────────────────────────────────────────────────────
      const selIndustries = state.selectedIndustries;
      const selEmployees = state.selectedEmployeeRanges;
      function toggleItem(arr, val) {
        return arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val];
      }
      el.innerHTML = '<div class="fade-up">' +
        '<div class="section-title">Find Leads</div>' +
        '<div class="section-sub">Filter by company profile — results always filtered to AWS tech stack.</div>' +
        '<div class="card">' +
          '<div style="margin-bottom:18px">' +
            '<div class="micro-label" style="margin-bottom:8px">INDUSTRY</div>' +
            '<div style="display:flex;flex-wrap:wrap;gap:6px">' +
              INDUSTRIES.map(ind => '<button class="btn-pill ' + (selIndustries.includes(ind.value) ? 'active' : '') + '" onclick="state.selectedIndustries=(state.selectedIndustries.includes(\'' + ind.value + '\')?state.selectedIndustries.filter(x=>x!==\'' + ind.value + '\'):[...state.selectedIndustries,\'' + ind.value + '\']);render()">' + ind.label + '</button>').join('') +
            '</div>' +
          '</div>' +
          '<div style="margin-bottom:18px">' +
            '<div class="micro-label" style="margin-bottom:8px">COMPANY SIZE</div>' +
            '<div style="display:flex;flex-wrap:wrap;gap:6px">' +
              EMPLOYEE_RANGES.map(r => '<button class="btn-pill ' + (selEmployees.includes(r) ? 'active' : '') + '" onclick="state.selectedEmployeeRanges=(state.selectedEmployeeRanges.includes(\'' + r + '\')?state.selectedEmployeeRanges.filter(x=>x!==\'' + r + '\'):[...state.selectedEmployeeRanges,\'' + r + '\']);render()">' + r + '</button>').join('') +
            '</div>' +
          '</div>' +
          '<div style="display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid rgba(255,255,255,0.05)">' +
            '<span style="font-size:12px;color:#506070;display:flex;align-items:center;gap:6px"><span style="width:7px;height:7px;border-radius:50%;background:#00ffc8;display:inline-block"></span>AWS tech stack always active</span>' +
            '<button class="btn-primary" onclick="doSearch()" ' + (searching ? 'disabled' : '') + ' id="search-btn">' + (searching ? 'Scanning...' : 'Search') + '</button>' +
          '</div>' +
        '</div>' +
${searching ? `<div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span id="prog-label" style="font-size:12px;color:#506070;animation:pulse 1.5s infinite">🔍 Scanning Apollo database...</span>
          <span style="font-size:12px;color:#00ffc8">${Math.round(searchProgress)}%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="prog-bar" style="width:${searchProgress}%"></div></div>
      </div>` : ''}
      ${filtered.length > 0 ? `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:13px;color:#506070">${filtered.length} prospects found</span>
          <button class="btn-primary" onclick="setStage(1)" ${!selectedLead?'disabled':''} style="${!selectedLead?'background:rgba(255,255,255,0.05);color:#405060;cursor:not-allowed':''}">Craft Outreach →</button>
        </div>
        ${filtered.map(l => leadCard(l, selectedLead?.id===l.id)).join('')}
      ` : (!searching ? `<div class="empty"><div class="empty-icon">🎯</div><div style="font-size:14px;margin-bottom:6px">Ready to find your next customers</div><div style="font-size:12px">Enter a job title above and hit Search</div></div>` : '')}
    </div>`;

  } else if (stage === 1) {
    // ── CRAFT OUTREACH ─────────────────────────────────────────────────────
    const typeLabels = [['initial','First Touch'],['followup','Follow Up'],['breakup','Break-up']];
    el.innerHTML = `<div class="fade-up">
      <div class="section-title">Craft Outreach</div>
      <div class="section-sub">Generate personalized emails for each prospect.</div>
      <div class="grid-outreach">
        <div>
          <div class="micro-label">SELECT PROSPECT</div>
          ${leads.length === 0 ? `<div style="padding:16px;background:rgba(255,255,255,0.02);border-radius:10px;font-size:13px;color:#405060;text-align:center">No leads yet — go to Find Leads first</div>` : leads.map(l => leadCard(l, selectedLead?.id===l.id)).join('')}
        </div>
        <div>
          ${selectedLead ? `
            <div class="card" style="margin-bottom:14px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                <div><span style="font-size:13px;font-weight:600;color:#e8edf5">${selectedLead.name}</span><span style="font-size:12px;color:#506070"> · ${selectedLead.company}</span></div>
                <div style="display:flex;gap:6px">
                  ${typeLabels.map(([v,l]) => `<button class="btn-pill ${emailType===v?'active':''}" onclick="setEmailType('${v}')">${l}</button>`).join('')}
                </div>
              </div>
              <div style="display:flex;gap:8px">
                <div style="flex:1;background:rgba(255,255,255,0.03);border-radius:8px;padding:8px 12px;font-size:12px"><span style="color:#405060">Email: </span><span style="color:#8090b0">${selectedLead.email}</span></div>
                <div style="flex:1;background:rgba(255,255,255,0.03);border-radius:8px;padding:8px 12px;font-size:12px"><span style="color:#405060">Funding: </span><span style="color:#8090b0">${selectedLead.funding}</span></div>
                ${selectedLead.linkedin ? `<div style="flex:1;background:rgba(255,255,255,0.03);border-radius:8px;padding:8px 12px;font-size:12px"><a href="${selectedLead.linkedin}" target="_blank" style="color:#60a0ff;text-decoration:none">View LinkedIn ↗</a></div>` : ''}
              </div>
            </div>
            <div style="display:flex;gap:10px;margin-bottom:12px">
              <button class="btn-primary" style="flex:1" onclick="generateAndShow()">⚡ Generate Email</button>
              ${emailContent ? `<button class="btn-ghost" id="copy-btn" onclick="copyEmail()">Copy</button>` : ''}
            </div>
            ${emailContent ? `<textarea class="email-area" rows="14" oninput="state.emailContent=this.value">${emailContent}</textarea>` : `<div style="background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.08);border-radius:12px;padding:32px;text-align:center;color:#405060"><div style="font-size:28px;margin-bottom:10px">✉️</div><div style="font-size:13px">Click Generate Email to create a personalized message</div></div>`}
          ` : `<div style="background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.08);border-radius:12px;padding:48px;text-align:center;color:#405060"><div style="font-size:36px;margin-bottom:12px">👈</div><div style="font-size:14px">Select a prospect to generate outreach</div></div>`}
        </div>
      </div>
    </div>`;

  } else if (stage === 2) {
    // ── FOLLOW UP ──────────────────────────────────────────────────────────
    const groups = { new: [], contacted: [], replied: [], meeting: [] };
    leads.forEach(l => { if (groups[l.status]) groups[l.status].push(l); });
    const cols = [
      { key:'new', label:'🎯 New Leads', desc:'Not yet contacted' },
      { key:'contacted', label:'📤 Contacted', desc:'Awaiting reply' },
      { key:'replied', label:'💬 Replied', desc:'In conversation' },
      { key:'meeting', label:'📅 Meeting Booked', desc:'Ready to close' },
    ];
    el.innerHTML = `<div class="fade-up">
      <div class="section-title">Follow Up</div>
      <div class="section-sub">Manage your follow-up sequence and track who needs attention.</div>
      ${leads.length === 0 ? `<div class="empty"><div class="empty-icon">📬</div><div style="font-size:14px">No leads to follow up with yet</div></div>` : `
      <div class="grid-2">
        ${cols.map(c => `
          <div class="card">
            <div style="margin-bottom:12px">
              <div style="font-size:14px;font-weight:600;color:#e8edf5;margin-bottom:2px">${c.label}</div>
              <div style="font-size:12px;color:#506070">${c.desc} · ${groups[c.key].length} leads</div>
            </div>
            ${groups[c.key].length === 0 ? `<div style="font-size:12px;color:#304050;padding:12px 0;text-align:center">None here yet</div>` :
              groups[c.key].map(l => `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid rgba(255,255,255,0.04)">
                <div><div style="font-size:13px;color:#c8d4e8">${l.name}</div><div style="font-size:11px;color:#506070">${l.company}</div></div>
                <button class="btn-action" onclick="selectLead('${l.id}');state.emailType='${c.key==='new'?'initial':c.key==='contacted'?'followup':'initial'}';setStage(1)">Draft →</button>
              </div>`).join('')}
          </div>
        `).join('')}
      </div>`}
    </div>`;

  } else if (stage === 3) {
    // ── PIPELINE ───────────────────────────────────────────────────────────
    const s = { found: leads.length, contacted: 0, replied: 0, meetings: 0 };
    leads.forEach(l => {
      if (['contacted','replied','meeting'].includes(l.status)) s.contacted++;
      if (['replied','meeting'].includes(l.status)) s.replied++;
      if (l.status === 'meeting') s.meetings++;
    });
    const kpis = [
      {label:'Leads Found', value:s.found, color:'#00ffc8', icon:'🎯'},
      {label:'Contacted', value:s.contacted, color:'#f0c040', icon:'📤'},
      {label:'Replied', value:s.replied, color:'#60a0ff', icon:'💬'},
      {label:'Meetings', value:s.meetings, color:'#c060ff', icon:'📅'},
    ];
    el.innerHTML = `<div class="fade-up">
      <div class="section-title">Pipeline</div>
      <div class="section-sub">Full overview of your prospecting funnel.</div>
      <div class="grid-4" style="margin-bottom:28px">
        ${kpis.map(k => `<div class="card" style="text-align:center;border-color:${k.color}20">
          <div style="font-size:28px;margin-bottom:8px">${k.icon}</div>
          <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:${k.color}">${k.value}</div>
          <div style="font-size:12px;color:#506070;margin-top:4px">${k.label}</div>
          ${k.value > 0 && s.found > 0 ? `<div style="font-size:11px;color:${k.color}80;margin-top:4px">${Math.round(k.value/s.found*100)}% of leads</div>` : ''}
        </div>`).join('')}
      </div>
      ${leads.length === 0 ? `<div class="empty"><div class="empty-icon">📊</div><div style="font-size:14px">Start by finding leads to build your pipeline</div></div>` : `
        <div class="micro-label">ALL PROSPECTS</div>
        ${leads.map(l => `<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;align-items:center;gap:14px">
            <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,${STATUS_COLORS[l.status]}30,${STATUS_COLORS[l.status]}10);display:flex;align-items:center;justify-content:center;font-size:16px">
              ${{new:'🎯',contacted:'📤',replied:'💬',meeting:'📅',declined:'❌'}[l.status]}
            </div>
            <div>
              <div style="font-size:13px;font-weight:600;color:#e8edf5">${l.name}</div>
              <div style="font-size:12px;color:#506070">${l.title} · ${l.company}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <div style="width:80px">${scoreBar(l.score)}</div>
            ${badge(l.status)}
            <button class="btn-ghost" style="font-size:11px;padding:5px 12px" onclick="selectLead('${l.id}');setStage(1)">Draft Email</button>
          </div>
        </div>`).join('')}
      `}
    </div>`;
  }
}

// Init
render();
</script>
</body>
</html>
