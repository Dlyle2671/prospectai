<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProspectAI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080c14; color: #c8d4e8; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp .35s ease both; }
    nav { display: flex; align-items: center; padding: 18px 32px; border-bottom: 1px solid #1a2540; background: rgba(8,12,20,.92); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -.4px; margin-right: auto; }
    .nav-logo span { color: #4f8ef7; }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab { padding: 7px 18px; border-radius: 8px; border: none; background: transparent; color: #6b7a99; font-size: 14px; font-family: inherit; cursor: pointer; transition: all .2s; }
    .nav-tab:hover { color: #c8d4e8; background: #111827; }
    .nav-tab.active { background: #1a2540; color: #fff; }
    main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    .section-title { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .section-sub { font-size: 14px; color: #6b7a99; margin-bottom: 28px; }
    .filter-group { margin-bottom: 20px; }
    .filter-label { font-size: 12px; font-weight: 600; color: #6b7a99; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill { padding: 6px 14px; border-radius: 20px; border: 1px solid #1a2540; background: #111827; color: #6b7a99; font-size: 13px; font-family: inherit; cursor: pointer; transition: all .2s; }
    .pill:hover { border-color: #4f8ef7; color: #c8d4e8; }
    .pill.active { background: #1a3a7a; border-color: #4f8ef7; color: #fff; }
    .pill.locked { background: #1a3a7a; border-color: #4f8ef7; color: #fff; opacity: .7; cursor: default; }
    .search-btn { margin-top: 28px; padding: 12px 32px; border-radius: 10px; border: none; background: linear-gradient(135deg,#4f8ef7,#2563eb); color: #fff; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity .2s; }
    .search-btn:hover { opacity: .88; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .results-count { font-size: 13px; color: #6b7a99; margin-bottom: 16px; }
    .card { background: #0d1424; border: 1px solid #1a2540; border-radius: 14px; padding: 20px 22px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 16px; transition: border-color .2s; }
    .card:hover { border-color: #2d3f6b; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; background: #1a2540; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; overflow: hidden; }
    .avatar img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
    .card-body { flex: 1; min-width: 0; }
    .person-name { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 2px; }
    .person-title { font-size: 13px; color: #4f8ef7; margin-bottom: 6px; }
    .person-company { font-size: 13px; color: #8a9bb8; margin-bottom: 8px; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .meta-tag { font-size: 12px; color: #6b7a99; background: #111827; padding: 3px 10px; border-radius: 6px; border: 1px solid #1a2540; }
    .meta-tag a { color: #4f8ef7; text-decoration: none; }
    .meta-tag a:hover { text-decoration: underline; }
    .email-tag { color: #22c55e; }
    .card-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-sm { padding: 6px 14px; border-radius: 8px; border: 1px solid #1a2540; background: #111827; color: #c8d4e8; font-size: 12px; font-family: inherit; cursor: pointer; transition: all .2s; }
    .btn-sm:hover { border-color: #4f8ef7; color: #fff; }
    .btn-hs { background: #ff7a59; border-color: #ff7a59; color: #fff; }
    .btn-hs:hover { background: #ff6240; }
    .btn-hs.sent { background: #1a5c38; border-color: #22c55e; color: #22c55e; cursor: default; }
    .empty-state { text-align: center; padding: 60px 20px; color: #6b7a99; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .settings-card { background: #0d1424; border: 1px solid #1a2540; border-radius: 14px; padding: 28px; margin-bottom: 16px; }
    .settings-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 16px; }
    .form-row { margin-bottom: 14px; }
    .form-label { font-size: 12px; color: #6b7a99; margin-bottom: 6px; font-weight: 500; }
    .form-input { width: 100%; padding: 10px 14px; background: #080c14; border: 1px solid #1a2540; border-radius: 8px; color: #c8d4e8; font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s; }
    .form-input:focus { border-color: #4f8ef7; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">Prospect<span>AI</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('leads', event)">Find Leads</button>
      <button class="nav-tab" onclick="showTab('settings', event)">Settings</button>
    </div>
  </nav>
  <main>
    <div id="tab-leads" class="tab-content active">
      <div id="app"></div>
    </div>
    <div id="tab-settings" class="tab-content">
      <div class="fade-up">
        <div class="section-title">Settings</div>
        <div class="section-sub">Configure your integrations.</div>
        <div class="settings-card">
          <div class="settings-title">&#9679; Integrations</div>
          <div class="form-row"><div class="form-label">Apollo API Key</div><input class="form-input" type="password" placeholder="Stored in Vercel environment" disabled /></div>
          <div class="form-row"><div class="form-label">HubSpot Access Token</div><input class="form-input" type="password" placeholder="Stored in Vercel environment" disabled /></div>
          <div style="font-size:13px;color:#22c55e;"><span class="status-dot"></span>All credentials stored securely in Vercel environment variables.</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    var INDUSTRIES = [
      'Technology','Software','SaaS','Cloud Computing','Cybersecurity',
      'Fintech','Healthcare','Biotech','E-commerce','Marketing',
      'Real Estate','Education','Manufacturing','Logistics','Media'
    ];
    var EMP_RANGES = [
      {label:'1-10',val:'1,10'},{label:'11-50',val:'11,50'},{label:'51-200',val:'51,200'},
      {label:'201-500',val:'201,500'},{label:'501-1000',val:'501,1000'},
      {label:'1001-5000',val:'1001,5000'},{label:'5001+',val:'5001,10000000'}
    ];
    var TITLE_OPTIONS = [
      'CEO','CTO','CFO','COO','CMO','VP of Sales','VP of Marketing',
      'VP of Engineering','Director of Sales','Director of Marketing',
      'Head of Growth','Head of Product','Sales Manager','Account Executive','Founder'
    ];
    var LIMIT_OPTIONS = [10, 25, 50, 100];


    var state = {
      stage: 0,
      results: [],
      selectedIndustries: [],
      selectedEmployeeRanges: [],
      selectedTechStack: ['AWS'],
      selectedTitles: [],
      selectedLimit: 25
    };

    function showTab(name, e) {
      document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
      document.querySelectorAll('.nav-tab').forEach(function(el) { el.classList.remove('active'); });
      document.getElementById('tab-' + name).classList.add('active');
      if (e && e.target) e.target.classList.add('active');
      if (name === 'leads') render();
    }

    function toggleFilter(type, val) {
      if (type === 'tech' && val === 'AWS') return;
      var arr = type === 'industry' ? state.selectedIndustries
        : type === 'emp' ? state.selectedEmployeeRanges
        : type === 'tech' ? state.selectedTechStack
        : state.selectedTitles;
      var idx = arr.indexOf(val);
      if (idx >= 0) arr.splice(idx, 1); else arr.push(val);
      render();
    }

    function pill(label, type, val, locked) {
      var active = locked || (type === 'industry' ? state.selectedIndustries : type === 'emp' ? state.selectedEmployeeRanges : type === 'tech' ? state.selectedTechStack : state.selectedTitles).indexOf(val) >= 0;
      var cls = 'pill' + (locked ? ' locked' : active ? ' active' : '');
      var handler = locked ? '' : ' onclick="toggleFilter(&apos;' + type + '&apos;,&apos;' + val + '&apos;)"';
      return '<button class="' + cls + '"' + handler + '>' + label + '</button>';
    }

    function render() {
      var el = document.getElementById('app');
      if (!el) return;

      if (state.stage === 0) {
        var indBtns = INDUSTRIES.map(function(v) { return pill(v, 'industry', v, false); }).join('');
        var empBtns = EMP_RANGES.map(function(r) { return pill(r.label, 'emp', r.val, false); }).join('');
        var limitBtns = LIMIT_OPTIONS.map(function(v) { return pill(v, 'limit', v, v === state.selectedLimit); }).join('');
        var titleBtns = TITLE_OPTIONS.map(function(v) { return pill(v, 'title', v, false); }).join('');
        el.innerHTML = '<div class="fade-up">'
          + '<div class="section-title">Find Leads</div>'
          + '<div class="section-sub">Search for individual contacts via Apollo. AWS is always included in the tech filter.</div>'
          + '<div class="filter-group"><div class="filter-label">Job Title</div><div class="pill-row">' + titleBtns + '</div></div>'
          + '<div class="filter-group"><div class="filter-label">Industry</div><div class="pill-row">' + indBtns + '</div></div>'
          + '<div class="filter-group"><div class="filter-label">Company Size (Employees)</div><div class="pill-row">' + empBtns + '</div></div>'
          + '<div class="filter-group"><div class="filter-label">Leads to Return</div><div class="pill-row">' + limitBtns + '</div></div>'
          + '<button class="search-btn" onclick="doSearch()">Search Contacts</button>'
          + '</div>';

      } else if (state.stage === 1) {
        el.innerHTML = '<div class="fade-up" style="text-align:center;padding:60px 0;">'
          + '<div class="spinner"></div>'
          + '<div style="font-size:15px;color:#6b7a99;margin-top:16px;">Searching Apollo...</div>'
          + '</div>';

      } else {
        var people = state.results;
        var cards = people.length ? people.map(function(p, i) {
          var avatarHtml = p.photo_url
            ? '<div class="avatar"><img src="' + p.photo_url + '" /></div>'
            : '<div class="avatar">&#128100;</div>';
          var metaTags = '';
          if (p.email) metaTags += '<span class="meta-tag email-tag">&#9993; ' + p.email + '</span>';
          if (p.company_size) metaTags += '<span class="meta-tag">&#128101; ' + p.company_size + '</span>';
          if (p.company_industry) metaTags += '<span class="meta-tag">' + p.company_industry + '</span>';
          if (p.linkedin_url) metaTags += '<span class="meta-tag"><a href="' + p.linkedin_url + '" target="_blank">LinkedIn</a></span>';
          return '<div class="card fade-up" style="animation-delay:' + (i * 0.04) + 's">'
            + avatarHtml
            + '<div class="card-body">'
            + '<div class="person-name">' + (p.name || 'Unknown') + '</div>'
            + '<div class="person-title">' + (p.title || '') + '</div>'
            + '<div class="person-company">' + (p.company_name || '') + (p.company_domain ? ' &middot; ' + p.company_domain : '') + '</div>'
            + (metaTags ? '<div class="card-meta">' + metaTags + '</div>' : '')
            + (p.email ? '<div class="contact-info"><span class="email-tag">â ' + p.email + '</span></div>' : '')
                        + '<div class="card-actions">'
            + '<button class="btn-sm btn-hs" id="hs-' + i + '" onclick="sendToHubspot(' + i + ')">&#8679; HubSpot</button>'
            + '</div>'
            + '</div></div>';
        }).join('')
        : '<div class="empty-state"><div class="empty-icon">&#128269;</div><div>No contacts found. Try different filters.</div></div>';

        el.innerHTML = '<div class="fade-up">'
          + '<button style="background:none;border:none;color:#4f8ef7;cursor:pointer;margin-bottom:20px;font-size:14px;" onclick="state.stage=0;render()">&#8592; Back to filters</button>'
          + '<div class="results-count">' + people.length + ' contacts found</div>'
          + cards + '</div>';
      }
    }

    function doSearch() {
      state.stage = 1;
      render();
      fetch('/api/apollo', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          industry: state.selectedIndustries,
          employee_ranges: state.selectedEmployeeRanges,
          tech_stack: state.selectedTechStack,
          titles: state.selectedTitles,
          per_page: state.selectedLimit
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) throw new Error(data.error);
        state.results = Array.isArray(data) ? data : [];
        state.stage = 2;
        render();
      })
      .catch(function(err) {
        state.stage = 0;
        render();
        alert('Search failed: ' + err.message);
      });
    }

    function sendToHubspot(i) {
      var p = state.results[i];
      if (!p) return;
      var btn = document.getElementById('hs-' + i);
      if (btn) { btn.textContent = 'Sending...'; btn.disabled = true; }
      fetch('/api/hubspot', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          first_name: p.first_name,
          last_name: p.last_name,
          email: p.email,
          title: p.title,
          company_name: p.company_name,
          company_domain: p.company_domain,
          linkedin_url: p.linkedin_url
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.error) throw new Error(d.error);
        if (btn) { btn.textContent = '&#10003; In HubSpot'; btn.classList.add('sent'); btn.disabled = true; }
      })
      .catch(function(err) {
        if (btn) { btn.textContent = 'Failed: ' + err.message.slice(0,20); btn.disabled = false; }
      });
    }

    render();
  </script>
</body>
</html>
